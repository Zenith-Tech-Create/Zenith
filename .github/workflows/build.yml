name: 🏗️ Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write  

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # macOS - ARM64 (Apple Silicon)
          - os: macos-latest
            target: mac
            arch: arm64
            
          # macOS - x64 (Intel)
          - os: macos-latest
            target: mac
            arch: x64
            
          # Windows - x64
          - os: windows-latest
            target: win
            arch: x64
            
          # Linux - x64
          - os: ubuntu-latest
            target: linux
            arch: x64

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: 📚 Install dependencies
        run: npm install

      - name: 🏗️ Build app (${{ matrix.target }} - ${{ matrix.arch }})
        run: npm run build:${{ matrix.target }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📤 Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-${{ matrix.arch }}
          path: dist/
          retention-days: 30

  create-release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📥 Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-combined/

      - name: 📦 Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist-combined/**/*.dmg
            dist-combined/**/*.zip
            dist-combined/**/*.exe
            dist-combined/**/*.AppImage
            dist-combined/**/*.deb
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

